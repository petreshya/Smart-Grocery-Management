<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Item - BudgetMart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 BudgetMart</h1>
            <p class="header-small">Smart Grocery Recommendation System</p>
        </header>

        <a href="index.html" id="back-btn">← Back to Dashboard</a>

        <section>
            <h2>Add New Grocery Item</h2>
            
            <div class="form-group">
                <label for="user_name">User Name</label>
                <input id="user_name" placeholder="Who is this for?">
            </div>

            <div class="form-group">
                <label for="name">Item Name</label>
                <input id="name" placeholder="e.g. Organic Milk">
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label for="category">Category</label>
                    <input id="category" placeholder="e.g. Dairy">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="price">Price (₹)</label>
                    <input id="price" type="number" placeholder="0.00">
                </div>
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="essential">Essential</option>
                        <option value="non-essential">Non-Essential</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="purchase_frequency">Frequency</label>
                    <select id="purchase_frequency">
                        <option value="Daily">Daily</option>
                        <option value="Weekly">Weekly</option>
                        <option value="Monthly">Monthly</option>
                    </select>
                </div>
            </div>

            <button class="primary" onclick="addItem()">✨ Add to List</button>
        </section>
    </div>

<script src="js/script.js"></script>
</body>
</html>

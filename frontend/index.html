<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BudgetMart - Smart Grocery System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 BudgetMart</h1>
            <p class="header-small">Smart Grocery Recommendation System</p>
            <p class="tagline">Fresh Choices. Smart Budget. Better Life.</p>
        </header>

        <section>
            <h2>User Profile</h2>
            <div class="form-group">
                <label for="user_name">Who's shopping today?</label>
                <input type="text" id="user_name" placeholder="Enter Your Name">
            </div>
        </section>

        <section>
            <h2>Set Monthly Budget</h2>
            <div class="form-group">
                <label for="budget">Allocate your monthly funds</label>
                <input type="number" id="budget" placeholder="e.g. 5000">
            </div>
            <button class="primary" onclick="setBudget()">Save Budget</button>
        </section>

        <section>
            <h2>Your Grocery List</h2>
            <button class="secondary" onclick="loadItems()">Load Current Items</button>
            <div id="itemList" class="item-list"></div>
        </section>

        <nav class="nav-links">
            <a href="add.html">➕ Add New Item</a>
            <a href="recommendation.html">🤖 Get Magic Suggestion</a>
        </nav>
    </div>

<script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recommendation - BudgetMart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 BudgetMart</h1>
            <p class="header-small">Smart Grocery Recommendation System</p>
        </header>

        <a href="index.html" id="back-btn">← Back to Dashboard</a>

        <section>
            <h2>AI Smart Recommendation</h2>
            <div class="form-group">
                <label for="user_name">Whose recommendation do you want?</label>
                <input type="text" id="user_name" placeholder="Enter Your Name">
            </div>
            <button class="primary" onclick="getRecommendation()">🤖 Generate Magic List</button>
        </section>

        <section id="result-section">
            <div id="recommendList"></div>
            <div id="summary"></div>
        </section>
    </div>

<script src="js/script.js"></script>
</body>
</html>
